name: Notify Plugin Library

on:
  push:
    branches: [main]

jobs:
  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - name: Run extractor unit tests
        run: python -m unittest discover -s test/ -v

  tw-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install tiddlywiki
      - name: Run wiki-test specs (no-op until specs are added)
        run: |
          mkdir -p /tmp/plugins/rimir/msg-import
          cp -r . /tmp/plugins/rimir/msg-import/
          TIDDLYWIKI_CLI_MODE=1 TIDDLYWIKI_PLUGIN_PATH=/tmp/plugins npx tiddlywiki test-edition --test spec="msg-import" || true

  notify:
    needs: [python-test, tw-test]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger library rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.LIBRARY_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/rimir-cc/tw-plugin-library/dispatches \
            -d '{"event_type":"plugin-updated","client_payload":{"plugin":"${{ github.event.repository.name }}"}}'
      - name: Trigger demo rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.LIBRARY_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/rimir-cc/tw-demo/dispatches \
            -d '{"event_type":"plugin-updated","client_payload":{"plugin":"${{ github.event.repository.name }}"}}'
